<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3-MoE-style EP2 token scaling on 2x RTX 3090</title>
  <desc id="desc">Throughput rises with routed tokens while memory stays nearly flat; dispatcher median remains around two milliseconds.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="48" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Qwen3-MoE-style EP2 token scaling</text>
  <text x="48" y="68" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">2 x RTX 3090, 20-step warm throughput plus EP dispatcher profiling</text>

  <line x1="88" y1="360" x2="470" y2="360" stroke="#111827" stroke-width="1"/>
  <line x1="88" y1="120" x2="88" y2="360" stroke="#111827" stroke-width="1"/>
  <text x="86" y="388" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#374151">256</text>
  <text x="279" y="388" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#374151">512</text>
  <text x="470" y="388" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#374151">1024</text>
  <text x="279" y="416" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#374151">tokens per step</text>

  <text x="58" y="365" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#6b7280">0K</text>
  <text x="58" y="260" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#6b7280">10K</text>
  <text x="58" y="155" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#6b7280">20K</text>
  <text x="88" y="104" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Warm throughput</text>
  <text x="88" y="438" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">End-to-end training throughput amortizes routing and dispatch overhead.</text>

  <rect x="68" y="300.6" width="40" height="59.4" rx="3" fill="#2563eb"/>
  <rect x="259" y="246.2" width="40" height="113.8" rx="3" fill="#2563eb"/>
  <rect x="450" y="118.9" width="40" height="241.1" rx="3" fill="#2563eb"/>
  <text x="88" y="292" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111827">5.66K</text>
  <text x="279" y="238" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111827">10.84K</text>
  <text x="470" y="111" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111827">22.96K</text>

  <line x1="560" y1="360" x2="830" y2="360" stroke="#111827" stroke-width="1"/>
  <line x1="560" y1="120" x2="560" y2="360" stroke="#111827" stroke-width="1"/>
  <text x="560" y="104" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Dispatcher and memory</text>
  <text x="530" y="365" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#6b7280">0</text>
  <text x="530" y="288" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#6b7280">1</text>
  <text x="530" y="211" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#6b7280">2</text>
  <text x="530" y="134" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#6b7280">3 ms</text>

  <polyline points="585,195 690,200 795,191" fill="none" stroke="#dc2626" stroke-width="3"/>
  <circle cx="585" cy="195" r="5" fill="#dc2626"/>
  <circle cx="690" cy="200" r="5" fill="#dc2626"/>
  <circle cx="795" cy="191" r="5" fill="#dc2626"/>
  <text x="585" y="181" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111827">2.14</text>
  <text x="690" y="186" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111827">2.07</text>
  <text x="795" y="177" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111827">2.19</text>

  <rect x="570" y="310" width="30" height="50" rx="3" fill="#059669"/>
  <rect x="675" y="309" width="30" height="51" rx="3" fill="#059669"/>
  <rect x="780" y="306" width="30" height="54" rx="3" fill="#059669"/>
  <text x="585" y="300" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#111827">1.30G</text>
  <text x="690" y="299" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#111827">1.32G</text>
  <text x="795" y="296" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#111827">1.40G</text>

  <text x="585" y="388" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#374151">256</text>
  <text x="690" y="388" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#374151">512</text>
  <text x="795" y="388" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#374151">1024</text>

  <rect x="560" y="425" width="14" height="14" fill="#2563eb"/>
  <text x="582" y="437" font-family="Arial, sans-serif" font-size="12" fill="#374151">tokens/s</text>
  <line x1="655" y1="432" x2="682" y2="432" stroke="#dc2626" stroke-width="3"/>
  <circle cx="668" cy="432" r="4" fill="#dc2626"/>
  <text x="692" y="437" font-family="Arial, sans-serif" font-size="12" fill="#374151">median dispatcher ms</text>
  <rect x="560" y="452" width="14" height="14" fill="#059669"/>
  <text x="582" y="464" font-family="Arial, sans-serif" font-size="12" fill="#374151">peak reserved memory</text>
  <text x="48" y="492" font-family="Arial, sans-serif" font-size="12" fill="#111827">mbs16 extension: 2048 tokens/step reaches 45.7K tokens/s, 1.82 GiB peak memory, dispatcher median 3.54 ms.</text>
</svg>
