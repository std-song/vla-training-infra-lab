# Project-specific config derived from VLASH examples/train/pi05/async_lora.yaml.
# Render __PROJECT_ROOT__ on the experiment host before running.
policy:
  type: pi05
  pretrained_path: __PROJECT_ROOT__/models/pi05_base
  push_to_hub: false
  dtype: bfloat16
  device: cuda
  state_cond: true

dataset:
  repo_id: lerobot/aloha_mobile_cabinet
  root: __PROJECT_ROOT__/datasets/aloha_mobile_cabinet
  episodes: [0]
  video_backend: torchcodec

output_dir: __PROJECT_ROOT__/outputs/vlash_pi05_sync_lora_smoke
job_name: vlash_pi05_sync_lora_smoke
batch_size: 1
grad_accum_steps: 1
steps: 5
num_workers: 0
seed: 1000

use_policy_training_preset: false
optimizer:
  type: adamw
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-10

scheduler:
  type: cosine_decay_with_warmup
  num_warmup_steps: 1
  peak_lr: 5.0e-5
  decay_lr: 2.5e-6
  num_decay_steps: 5

save_checkpoint: true
save_freq: 5
log_freq: 1
wandb:
  enable: false

max_delay_steps: 0
shared_observation: false
lora:
  enable: true
  backend: peft
  extra_trainable_modules:
    - action_in_proj
    - action_out_proj
    - time_mlp_in
    - time_mlp_out
    - state_proj
    - state_mlp_in
    - state_mlp_out
    - embeddings
    - input_layernorm
    - post_attention_layernorm
  r: 16
  alpha: 16
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    - out_proj
    - fc1
    - fc2
