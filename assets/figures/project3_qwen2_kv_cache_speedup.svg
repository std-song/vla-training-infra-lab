<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-labelledby="title desc">
  <title id="title">Project 3 Qwen2 KV cache speedup</title>
  <desc id="desc">Bar chart showing cached decode speedup over no-cache decode for selected Qwen2 benchmark shapes.</desc>
  <rect width="860" height="430" fill="#ffffff"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">KV cache speedup depends on shape</text>
  <text x="40" y="68" font-family="Arial, sans-serif" font-size="13" fill="#536174">Qwen2-0.5B, SDPA + BF16, speedup = no-cache decode time / cached decode time</text>
